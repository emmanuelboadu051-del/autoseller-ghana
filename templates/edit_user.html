{% extends 'layout.html' %}
{% block content %}
<h2>Edit User</h2>
<form method="POST" class="card p-3" style="max-width: 500px;">
  <div class="mb-3">
    <label class="form-label">Username</label>
    <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Email (optional)</label>
    <input type="email" name="email" class="form-control" value="{{ user.email or '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">New Password (optional)</label>
    <input type="password" name="password" class="form-control" minlength="8">
    <div class="form-text">If provided, use at least 8 chars with uppercase, lowercase, and number.</div>
  </div>
  <div class="mb-3">
    <label class="form-label">Role</label>
    <select name="role" class="form-select" required>
      <option value="staff" {% if user.role == 'staff' %}selected{% endif %}>Staff</option>
      <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
    </select>
  </div>
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" id="is_approved" name="is_approved" {% if user.is_approved %}checked{% endif %}>
    <label class="form-check-label" for="is_approved">Account approved</label>
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="{{ url_for('users') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
