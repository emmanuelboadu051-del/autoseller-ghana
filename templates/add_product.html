{% extends 'layout.html' %}
{% block content %}
  <h1>Add Product</h1>
  <form method="POST" action="{{ url_for('add_product') }}" class="row g-3" enctype="multipart/form-data">
    <div class="col-md-6">
      <label for="name" class="form-label">Name</label>
      <input type="text" name="name" id="name" value="{{ name|default('') }}" class="form-control" required />
    </div>
    <div class="col-md-6">
      <label for="price" class="form-label">Price (GHS)</label>
      <input type="number" step="0.01" name="price" id="price" value="{{ price|default('') }}" class="form-control" required />
    </div>
    <div class="col-md-6">
      <label for="quantity" class="form-label">Quantity</label>
      <input type="number" name="quantity" id="quantity" value="{{ quantity|default('') }}" class="form-control" required />
    </div>
    <div class="col-md-6">
      <label for="category" class="form-label">Category</label>
      <input type="text" name="category" id="category" value="{{ category|default('') }}" class="form-control" placeholder="Electronics, Fashion, Food..." />
    </div>
    <div class="col-12">
      <label for="description" class="form-label">Description</label>
      <textarea name="description" id="description" class="form-control" rows="4">{{ description|default('') }}</textarea>
    </div>
    <div class="col-12">
      <label for="image_url" class="form-label">Image URL</label>
      <input type="url" name="image_url" id="image_url" value="{{ image_url|default('') }}" class="form-control" placeholder="https://example.com/product-image.jpg" />
    </div>
    <div class="col-12">
      <label for="image_file" class="form-label">Upload Image</label>
      <input type="file" name="image_file" id="image_file" accept="image/*" class="form-control" />
      <div class="form-text">If you upload an image, it will be used instead of the URL.</div>
    </div>
    <div class="col-12">
      <img id="product-preview" src="{{ image_url|default(url_for('static', filename='img/product-placeholder.svg')) }}" alt="Preview" style="max-width: 240px; border-radius: 8px; border: 1px solid #e9ecef;" />
    </div>
    <div class="col-12">
      <button type="submit" class="btn btn-primary">Save</button>
      <a class="btn btn-secondary" href="{{ url_for('home') }}">Cancel</a>
    </div>
  </form>

  <script>
    const imageUrlInput = document.getElementById('image_url');
    const imageFileInput = document.getElementById('image_file');
    const preview = document.getElementById('product-preview');
    const placeholder = "{{ url_for('static', filename='img/product-placeholder.svg') }}";

    imageUrlInput.addEventListener('input', function () {
      preview.src = imageUrlInput.value.trim() || placeholder;
    });

    imageFileInput.addEventListener('change', function () {
      const file = imageFileInput.files && imageFileInput.files[0];
      if (!file) {
        preview.src = imageUrlInput.value.trim() || placeholder;
        return;
      }

      const reader = new FileReader();
      reader.onload = function (event) {
        preview.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
  </script>
{% endblock %}
