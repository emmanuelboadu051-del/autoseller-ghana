{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card p-4">
      <h3 class="mb-3">Forgot Password</h3>
      <p class="text-muted">Enter your username or email to generate a reset link.</p>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username or Email</label>
          <input type="text" name="identity" class="form-control" required>
        </div>
        <button class="btn btn-primary" type="submit">Generate Reset Link</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('login') }}">Back to Login</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
