{% extends 'layout.html' %}
{% block content %}
<div class="card p-4" style="max-width: 520px; margin: 60px auto;">
  <h2 class="mb-1">Pay with Paystack</h2>
  <p class="text-muted mb-4">You will be redirected to Paystack to complete your payment securely.</p>

  <dl class="row mb-4">
    <dt class="col-5">Amount</dt>
    <dd class="col-7">GH₵ {{ '%.2f'|format(amount / 100) }}</dd>
    <dt class="col-5">Customer</dt>
    <dd class="col-7">{{ name }}</dd>
    <dt class="col-5">Phone / Email</dt>
    <dd class="col-7">{{ email }}</dd>
  </dl>

  <button id="pay-btn" class="btn btn-primary w-100 btn-lg">Pay GH₵ {{ '%.2f'|format(amount / 100) }}</button>
  <div class="mt-3 text-center">
    <a class="text-muted small" href="{{ url_for('cart') }}">← Back to cart</a>
  </div>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
  document.getElementById('pay-btn').addEventListener('click', function() {
    var handler = PaystackPop.setup({
      key: '{{ paystack_key }}',
      email: '{{ email }}',
      amount: {{ amount }},
      currency: 'GHS',
      ref: '{{ reference }}',
      metadata: { custom_fields: [{ display_name: 'Customer', variable_name: 'customer', value: '{{ name }}' }] },
      callback: function(response) {
        window.location.href = '{{ url_for("paystack_callback") }}?reference=' + response.reference;
      },
      onClose: function() {
        // user closed popup without paying — do nothing
      }
    });
    handler.openIframe();
  });
</script>
{% endblock %}
