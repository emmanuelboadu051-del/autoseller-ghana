services:
  - type: web
    name: autoseller-ghana
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: DATABASE_URL
        fromDatabase:
          name: autoseller-ghana-db
          property: connectionString

databases:
  - name: autoseller-ghana-db
    plan: starter
    databaseName: autoseller_ghana
    user: autoseller_ghana
